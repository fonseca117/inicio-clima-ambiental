<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🌡️ Smart Climate Dashboard</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: linear-gradient(135deg, #1f4037, #99f2c8);
    min-height: 100vh;
    font-family: 'Segoe UI';
    color: white;
}

.card-glass {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}

.temp-value {
    font-size: 4rem;
    font-weight: bold;
    transition: all 0.3s ease;
}

.status-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    display: inline-block;
}

.online { background: #00ff88; }
.offline { background: red; }

button {
    border-radius: 20px !important;
}

.log-box {
    max-height: 200px;
    overflow-y: auto;
    font-size: 0.85rem;
}
</style>
</head>

<body>

<div class="container py-4">

    <!-- HEADER -->
    <div class="text-center mb-4">
        <h1 class="fw-bold">🌡️ Smart Climate Dashboard</h1>
        <p>Monitoreo en tiempo real</p>

        <span id="statusDot" class="status-dot offline"></span>
        <span id="statusText">Desconectado</span>
    </div>

    <!-- TEMPERATURA -->
    <div class="row mb-4">
        <div class="col-md-6">
            <div class="card-glass text-center">
                <h4>Temperatura</h4>
                <div id="tempValue" class="temp-value">--°C</div>
                <p id="sensorId">Sensor: --</p>
                <p id="lastUpdate">--</p>
            </div>
        </div>

        <!-- STATUS -->
        <div class="col-md-6">
            <div class="card-glass text-center">
                <h4>Estado</h4>
                <div id="tempStatus">Esperando datos...</div>
            </div>
        </div>
    </div>

    <!-- GRÁFICA -->
    <div class="card-glass mb-4">
        <canvas id="tempChart"></canvas>
    </div>

    <!-- BOTONES -->
    <div class="text-center mb-4">
        <button class="btn btn-light me-2" onclick="fetchData()">
            🔄 Actualizar
        </button>
        <button class="btn btn-outline-light" onclick="toggleAuto()" id="autoBtn">
            ▶ Auto OFF
        </button>
    </div>

    <!-- LOGS -->
    <div class="card-glass log-box" id="logs"></div>

</div>

<script>
const URL = 'https://unmonumental-touchily-meghann.ngrok-free.dev/api/temperatura';

let auto = false;
let interval;

let temps = [];
let labels = [];

// CHART
const ctx = document.getElementById('tempChart').getContext('2d');
const chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: labels,
        datasets: [{
            label: 'Temperatura °C',
            data: temps,
            borderWidth: 3,
            tension: 0.4
        }]
    }
});

// LOG
function log(msg){
    const box = document.getElementById('logs');
    const time = new Date().toLocaleTimeString();
    box.innerHTML = `[${time}] ${msg}<br>` + box.innerHTML;
}

// STATUS
function setStatus(ok){
    document.getElementById('statusDot').className = 'status-dot ' + (ok ? 'online':'offline');
    document.getElementById('statusText').innerText = ok ? 'Conectado':'Error';
}

// FETCH
async function fetchData(){
    log("Consultando sensor...");

    try{
        const res = await fetch(URL);
        const data = await res.json();

        const temp = parseFloat(data.temperatura_c);

        document.getElementById('tempValue').innerText = temp + "°C";
        document.getElementById('sensorId').innerText = "Sensor: " + data.sensor_id;
        document.getElementById('lastUpdate').innerText = new Date().toLocaleString();

        // STATUS TEMP
        const status = document.getElementById('tempStatus');
        if(temp > 30){
            status.innerHTML = "🔥 Alta";
        } else if(temp < 20){
            status.innerHTML = "❄ Baja";
        } else {
            status.innerHTML = "✅ Normal";
        }

        // GRAPH
        if(temps.length > 10){
            temps.shift();
            labels.shift();
        }

        temps.push(temp);
        labels.push(new Date().toLocaleTimeString());

        chart.update();

        setStatus(true);
        log("OK " + temp + "°C");

    }catch(e){
        setStatus(false);
        log("ERROR: " + e.message);
    }
}

// AUTO
function toggleAuto(){
    const btn = document.getElementById("autoBtn");

    if(auto){
        clearInterval(interval);
        auto = false;
        btn.innerText = "▶ Auto OFF";
        log("Auto OFF");
    }else{
        fetchData();
        interval = setInterval(fetchData, 5000);
        auto = true;
        btn.innerText = "⏹ Auto ON";
        log("Auto ON");
    }
}

window.onload = () => {
    log("Sistema listo 🚀");
};
</script>

</body>
</html>
