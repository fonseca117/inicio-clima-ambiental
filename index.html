<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌡️ Dashboard Clima Ambiental</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            min-height: 100vh;
        }

        .dashboard-container {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            margin-top: 2rem;
        }

        .temp-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 15px;
            padding: 2rem;
            text-align: center;
        }

        .temp-value {
            font-size: 4rem;
            font-weight: bold;
        }

        .status-indicator {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-online { background: green; }
        .status-offline { background: red; }

        .log-container {
            background: #f1f1f1;
            padding: 1rem;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>

<body>

<div class="connection-status p-2 bg-white position-fixed top-0 end-0 m-3 rounded shadow">
    <span id="connectionDot" class="status-indicator status-offline"></span>
    <span id="connectionText">Desconectado</span>
</div>

<div class="container">
    <div class="dashboard-container">

        <h1 class="text-center mb-4">🌡️ Dashboard Clima</h1>

        <div class="temp-card">
            <h3>Temperatura</h3>
            <div id="tempValue" class="temp-value">--°C</div>
            <div id="sensorId">Sensor: --</div>
            <div id="lastUpdate">--</div>
        </div>

        <div class="text-center mt-4">
            <button class="btn btn-primary" onclick="fetchData()">Actualizar</button>
            <button class="btn btn-outline-primary" onclick="toggleAutoRefresh()" id="autoBtn">
                Auto OFF
            </button>
        </div>

        <div class="log-container mt-4" id="logContainer"></div>

    </div>
</div>

<script>
    // 🔥 TU URL DE NGROK YA CONFIGURADA
    const VM_SENSOR_URL = 'https://unmonumental-touchily-meghann.ngrok-free.dev/api/temperatura';

    let autoRefresh = false;
    let interval = null;

    function log(msg) {
        const container = document.getElementById("logContainer");
        const time = new Date().toLocaleTimeString();
        container.innerHTML = `<div>[${time}] ${msg}</div>` + container.innerHTML;
    }

    function setConnection(status) {
        const dot = document.getElementById("connectionDot");
        const text = document.getElementById("connectionText");

        if (status) {
            dot.className = "status-indicator status-online";
            text.innerText = "Conectado";
        } else {
            dot.className = "status-indicator status-offline";
            text.innerText = "Desconectado";
        }
    }

    async function fetchData() {
        log("Consultando sensor...");

        try {
            const response = await fetch(VM_SENSOR_URL);
            const data = await response.json();

            document.getElementById("tempValue").innerText = data.temperatura_c + "°C";
            document.getElementById("sensorId").innerText = "Sensor: " + data.sensor_id;
            document.getElementById("lastUpdate").innerText = new Date(data.timestamp).toLocaleString();

            setConnection(true);
            log("Datos recibidos correctamente");

        } catch (error) {
            setConnection(false);
            log("Error: " + error.message);
        }
    }

    function toggleAutoRefresh() {
        const btn = document.getElementById("autoBtn");

        if (autoRefresh) {
            clearInterval(interval);
            autoRefresh = false;
            btn.innerText = "Auto OFF";
            log("Auto desactivado");
        } else {
            fetchData();
            interval = setInterval(fetchData, 5000);
            autoRefresh = true;
            btn.innerText = "Auto ON";
            log("Auto activado");
        }
    }

    window.onload = () => {
        log("Dashboard listo");
    };
</script>

</body>
</html>
