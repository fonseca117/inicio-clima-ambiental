<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🌡️ AI Climate System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:'Segoe UI';
}

.glass{
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border-radius:20px;
    padding:20px;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

.temp{
    font-size:4rem;
    font-weight:bold;
}

.alert-box{
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

.high{background:#ff4d4d;}
.low{background:#3498db;}
.normal{background:#2ecc71;}

.dot{
    width:10px;height:10px;border-radius:50%;
    display:inline-block;
}

.on{background:#00ff88;}
.off{background:red;}
</style>
</head>

<body>

<div class="container py-4">

<h1 class="text-center mb-4">🤖 AI Climate System</h1>

<div class="text-center mb-3">
<span id="dot" class="dot off"></span>
<span id="status">Offline</span>
</div>

<div class="row">

<div class="col-md-4">
<div class="glass text-center">
<h5>Sensor Principal</h5>
<div id="temp" class="temp">--</div>
<div id="sensor">--</div>
<div id="time"></div>

<div id="alert" class="alert-box normal">Esperando datos</div>
</div>
</div>

<div class="col-md-8">
<div class="glass">
<canvas id="chart"></canvas>
</div>
</div>

</div>

<div class="text-center mt-4">
<button class="btn btn-light" onclick="getData()">Actualizar</button>
<button class="btn btn-outline-light" onclick="autoToggle()" id="autoBtn">Auto OFF</button>
</div>

<div class="glass mt-4" id="logs" style="max-height:200px;overflow:auto;"></div>

</div>

<script>
const URL = "https://unmonumental-touchily-meghann.ngrok-free.dev/api/temperatura";

let temps = JSON.parse(localStorage.getItem("temps")) || [];
let times = JSON.parse(localStorage.getItem("times")) || [];

const ctx = document.getElementById("chart");
const chart = new Chart(ctx,{
type:"line",
data:{
labels:times,
datasets:[{label:"Temp °C",data:temps,tension:0.4}]
}
});

function log(m){
const l=document.getElementById("logs");
l.innerHTML = "["+new Date().toLocaleTimeString()+"] "+m+"<br>"+l.innerHTML;
}

function status(ok){
document.getElementById("dot").className="dot "+(ok?"on":"off");
document.getElementById("status").innerText= ok?"Online":"Error";
}

function predict(){
if(temps.length<3) return "--";

let diff = temps[temps.length-1] - temps[temps.length-2];
return (temps[temps.length-1] + diff).toFixed(1);
}

async function getData(){
try{
const r = await fetch(URL);
const d = await r.json();

let t = parseFloat(d.temperatura_c);

document.getElementById("temp").innerText = t+"°C";
document.getElementById("sensor").innerText = d.sensor_id;
document.getElementById("time").innerText = new Date().toLocaleString();

temps.push(t);
times.push(new Date().toLocaleTimeString());

if(temps.length>15){temps.shift();times.shift();}

localStorage.setItem("temps",JSON.stringify(temps));
localStorage.setItem("times",JSON.stringify(times));

chart.update();

let alert = document.getElementById("alert");

if(t>30){
alert.className="alert-box high";
alert.innerText="🔥 Alta temperatura | Predicción: "+predict()+"°C";
}else if(t<20){
alert.className="alert-box low";
alert.innerText="❄ Baja temperatura | Predicción: "+predict()+"°C";
}else{
alert.className="alert-box normal";
alert.innerText="✅ Normal | Predicción: "+predict()+"°C";
}

status(true);
log("OK "+t);

}catch(e){
status(false);
log("ERROR "+e.message);
}
}

let auto=false, int;

function autoToggle(){
const btn=document.getElementById("autoBtn");

if(auto){
clearInterval(int);
auto=false;
btn.innerText="Auto OFF";
log("Auto OFF");
}else{
getData();
int=setInterval(getData,4000);
auto=true;
btn.innerText="Auto ON";
log("Auto ON");
}
}

log("Sistema IA iniciado 🚀");
</script>

</body>
</html>
